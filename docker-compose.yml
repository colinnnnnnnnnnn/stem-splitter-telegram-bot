services:
  bot:
    build: .
    env_file: .env
    volumes:
      - ./data/input:/data/input
      - ./data/output:/data/output
      - ./data/done:/data/done
    depends_on:
      - demucs
    restart: unless-stopped

  demucs:
    image: xserrat/facebook-demucs:latest
    volumes:
      - ./data/input:/data/input
      - ./data/output:/data/output
      - ./data/done:/data/done
      - ./demucs-watch.sh:/demucs-watch.sh:ro
    entrypoint: ["/bin/sh", "/demucs-watch.sh"]
    restart: unless-stopped
